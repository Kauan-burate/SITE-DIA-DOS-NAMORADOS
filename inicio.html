<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
        }

        .carta{
            position: relative;
            width: 90%;
            max-width: 400px;
        }

        #titulo{
            text-align: center;
            color: #b8860b;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }

        .carta img{
            width: 100%;
            height: auto;
            display: block;
        }

        #circulo{
            position: absolute;
            width: 152px;
            height: 152px;
            border-radius: 50%;

            left: 50%;
            transform: translateX(-50%);

            top: 45%;

            background-color: transparent;
            cursor: pointer;
        }

        @media (max-width: 768px){

            #titulo{
                font-size: 1.3rem;
            }

            #circulo{
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 480px){

            #titulo{
                font-size: 1.1rem;
            }

            #circulo{
                width: 65px;
                height: 65px;
            }
        }
    </style>
</head>
<body>

    <div class="carta">

        <h1 id="titulo" class="text-center">
            PRESENTINHO PARA DEMONSTRAR O MEU AMOR POR VOCÊ! ❤️
        </h1>

        <img src="img/carta.png" alt="Carta" class="img-fluid">

        <a href="./index.html">
            <div id="circulo"></div>
        </a>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
